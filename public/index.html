<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Planner</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">
      <h1>The Week</h1>
      <nav class="week-nav" aria-label="Week navigation">
        <button id="wk-prev" class="wk-btn" title="Previous week">‹</button>
        <button id="wk-next" class="wk-btn" title="Next week">›</button>
      </nav>
      <span id="current-weather" class="current-weather"></span>
    </div>
    <div id="prayer-strip" class="prayer-strip" title="Prayer times (Hanafi madhab, Sydney)"></div>
    <div class="topbar-clock">
      <div class="menu-wrap">
        <button id="menu-btn" class="theme-btn" title="Edit &amp; settings">⋯</button>
        <div id="menu-dd" class="menu-dd hidden">
          <button id="edit-btn" class="menu-item">✏️ Edit board</button>
          <a href="settings.html" class="menu-item">⚙️ Routine settings</a>
        </div>
      </div>
      <button id="theme-btn" class="theme-btn" title="Switch theme"></button>
      <div id="today-label" class="today-label"></div>
      <div id="clock" class="clock"></div>
    </div>
  </header>

  <div id="hourly-strip" class="hourly-strip" title="Today’s hourly forecast"></div>

  <div class="notes-strip" id="notes-strip" title="Tap to edit notes">
    <span class="notes-icon">📌</span>
    <span id="notes-text" class="notes-text"></span>
  </div>

  <main id="board" class="board" aria-label="Weekly board"></main>

  <script type="module" src="app.js"></script>
</body>
</html>
